# Local stack. `db` is the persistent pgvector store; `migrate-seed` is the one-off init
# job that runs migrations then seeds the bundled corpus before serving (DECISIONS.md §9).
# Idempotent: a second `docker compose up` re-applies nothing and is effectively instant.
# The `app` service (which `depends_on` migrate-seed completing) is added in #7.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hr_assistant
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d hr_assistant']
      interval: 5s
      timeout: 5s
      retries: 10

  # One-off: migrate the schema, then seed the corpus. Exits 0 when the index is ready.
  migrate-seed:
    build: .
    command: ['sh', '-c', 'pnpm db:migrate && pnpm seed']
    # OPENROUTER_API_KEY (required by seed embeddings) comes from .env; optional so a
    # fresh checkout without .env still parses (the job then fails fast on a missing key).
    env_file:
      - path: .env
        required: false
    environment:
      # Reach the db over the compose network, not localhost.
      DATABASE_URL: postgres://postgres:postgres@db:5432/hr_assistant
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'

volumes:
  pgdata:
