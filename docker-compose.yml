# Local stack (DECISIONS.md §9):
#   db           — persistent pgvector store
#   migrate-seed — one-off init job: migrations + corpus seed, then exits 0
#   app          — stateless serving, starts only after migrate-seed completes successfully
# Idempotent: a second `docker compose up` re-applies nothing and is effectively instant.
# All three share one image (built once); the app overrides the image's default CMD.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hr_assistant
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d hr_assistant']
      interval: 5s
      timeout: 5s
      retries: 10

  # One-off: migrate the schema, then seed the corpus. Exits 0 when the index is ready.
  migrate-seed:
    build: .
    command: ['sh', '-c', 'pnpm db:migrate && pnpm seed']
    # OPENROUTER_API_KEY (required by seed embeddings) comes from .env; optional so a
    # fresh checkout without .env still parses (the job then fails fast on a missing key).
    env_file:
      - path: .env
        required: false
    environment:
      # Reach the db over the compose network, not localhost.
      DATABASE_URL: postgres://postgres:postgres@db:5432/hr_assistant
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'

  # Stateless serving: srvx serves the Vite build (fetch handler + client assets). Reads the
  # vector store only — never seeds. Waits for the one-off init to finish before accepting traffic.
  app:
    build: .
    command: ['pnpm', 'start']
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/hr_assistant
      PORT: '3000'
    ports:
      - '3000:3000'
    depends_on:
      migrate-seed:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
